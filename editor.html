<!doctype html>
<!--
  Ghost//Process — scene editor.
  Open at http://localhost:8765/editor.html

  Responsive layout:
    - wide screens (>= 1024px) → 3-column: scenes | canvas | inspector
    - narrow screens           → stacked, with a tab bar to switch
                                  between scenes / canvas / inspector

  Lets you drag sprites to position them, drag-draw hitboxes, swap
  backgrounds/music, and edit item metadata. Writes back to
  story.json via PUT /api/story.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ghost//Process — scene editor</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0d1117; color: #d9dde3;
    font-family: ui-monospace, "SF Mono", "Menlo", Consolas, monospace; font-size: 13px;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; background: #1c2129; border: 1px solid #30363d;
    padding: 6px 10px; border-radius: 4px; cursor: pointer; }
  button:hover { background: #2a313c; border-color: #4d5663; }
  button.primary { background: #2ea043; border-color: #2ea043; color: white; }
  button.primary:hover { background: #3fb950; }
  button.danger { background: #4d1d1d; border-color: #6e2929; color: #ff9999; }
  button.active { background: #1f4d80; border-color: #3470bd; color: #cce6ff; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; padding: 5px 7px; background: #0d1117; color: #d9dde3;
    border: 1px solid #30363d; border-radius: 3px; font: inherit;
  }
  textarea { min-height: 60px; resize: vertical; }
  input[type=checkbox] { transform: scale(1.2); }

  /* ---------- layout ---------- */
  #app {
    display: grid; height: 100%;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 240px 1fr 320px;
    grid-template-areas:
      "topbar topbar topbar"
      "left   center right"
      "bottom bottom bottom";
  }
  /* narrow screen: collapse to 1-col with a tab bar */
  @media (max-width: 1023px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
      grid-template-areas:
        "topbar"
        "center"
        "bottom";
    }
    #left, #right { position: fixed; top: 44px; bottom: 56px; left: 0; right: 0;
      background: #0d1117; z-index: 50; overflow-y: auto; padding: 8px;
      display: none; }
    #left.show, #right.show { display: block; }
    .tab-toggle { display: flex !important; }
  }
  .tab-toggle { display: none; gap: 4px; padding: 6px; background: #161b22; border-top: 1px solid #30363d; }
  .tab-toggle button { flex: 1; }
  .tab-toggle button.active { background: #1f4d80; }

  #topbar { grid-area: topbar; display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; background: #161b22; border-bottom: 1px solid #30363d; }
  #topbar h1 { font-size: 14px; margin: 0; flex: 0 0 auto; }
  #topbar .scene-name { color: #6c7280; flex: 1; }
  #status.saved { color: #3fb950; }
  #status.dirty { color: #f0b760; }
  #status.error { color: #ff7070; }

  #left   { grid-area: left;   overflow-y: auto; padding: 8px; background: #0d1117; border-right: 1px solid #30363d; }
  #center { grid-area: center; overflow: hidden; padding: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px; background: #050608; }
  #right  { grid-area: right;  overflow-y: auto; padding: 8px; background: #0d1117; border-left: 1px solid #30363d; }

  /* ---------- left panel ---------- */
  #left h3, #right h3 { margin: 4px 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6c7280; }
  #left .addrow { display: flex; gap: 4px; margin-bottom: 8px; }
  #left .addrow button { flex: 1; padding: 4px 6px; font-size: 11px; }
  #scene-list, #item-list { list-style: none; margin: 0; padding: 0; }
  #scene-list li, #item-list li {
    display: flex; align-items: center; gap: 6px; padding: 5px 8px;
    cursor: pointer; border-radius: 3px; margin-bottom: 2px;
    border: 1px solid transparent;
  }
  #scene-list li:hover, #item-list li:hover { background: #1c2129; }
  #scene-list li.active, #item-list li.active { background: #1f4d80; border-color: #3470bd; }
  #scene-list li .swatch, #item-list li .swatch {
    width: 10px; height: 10px; border-radius: 2px; background: #6c7280; flex-shrink: 0;
  }
  #scene-list li.has-bg .swatch { background: #3fb950; }
  #scene-list li .count, #item-list li .count { margin-left: auto; color: #6c7280; font-size: 11px; }

  /* ---------- center / canvas ---------- */
  #viewport-toolbar { display: flex; gap: 8px; align-items: center; padding: 4px 8px;
    background: #161b22; border: 1px solid #30363d; border-radius: 4px; }
  #viewport-toolbar label { color: #6c7280; }
  #viewport-toolbar select { width: auto; }

  #canvas-frame {
    position: relative; background: #000; border: 1px solid #30363d;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.6);
    transform-origin: top center;
  }
  #bg-canvas { display: block; image-rendering: pixelated; }
  #overlay { position: absolute; inset: 0; pointer-events: none; }
  #overlay > * { pointer-events: auto; }

  .sprite-handle {
    position: absolute; box-sizing: border-box; outline: 1px dashed #f0b760;
    outline-offset: -1px; cursor: grab; touch-action: none;
  }
  .sprite-handle.selected { outline: 1px solid #f0b760; box-shadow: 0 0 0 1px rgba(240,183,96,0.3); }
  .sprite-handle.dragging { cursor: grabbing; }
  .sprite-handle .label {
    position: absolute; top: -16px; left: 0; font-size: 10px; color: #f0b760;
    background: #0d1117; padding: 0 4px;
  }
  .sprite-handle .resize {
    position: absolute; right: -5px; bottom: -5px; width: 10px; height: 10px;
    background: #f0b760; border: 1px solid #0d1117; cursor: nwse-resize;
  }

  .hitbox-handle {
    position: absolute; box-sizing: border-box; outline: 1px solid #6cba6c;
    background: rgba(108,186,108,0.08); cursor: grab; touch-action: none;
  }
  .hitbox-handle.selected { background: rgba(108,186,108,0.18); box-shadow: 0 0 0 1px #6cba6c; }
  .hitbox-handle.dragging { cursor: grabbing; }
  .hitbox-handle .label {
    position: absolute; top: -16px; left: 0; font-size: 10px; color: #6cba6c;
    background: #0d1117; padding: 0 4px;
  }
  .hitbox-handle .resize {
    position: absolute; right: -5px; bottom: -5px; width: 10px; height: 10px;
    background: #6cba6c; border: 1px solid #0d1117; cursor: nwse-resize;
  }

  #draw-preview { position: absolute; border: 1px dashed #6cba6c;
    background: rgba(108,186,108,0.1); box-sizing: border-box;
    pointer-events: none; z-index: 999; }

  /* ---------- bottom toolbar ---------- */
  #bottombar { grid-area: bottom; display: flex; gap: 8px; padding: 6px 12px;
    background: #161b22; border-top: 1px solid #30363d; align-items: center; }
  .tool-group { display: flex; gap: 4px; }
  #tool-banner { color: #6cba6c; font-size: 12px; margin-left: 12px; }

  /* ---------- right / inspector ---------- */
  .field { margin-bottom: 8px; }
  .field > label { display: block; color: #6c7280; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .field .ctrl { color: #d9dde3; }
  .field .row { display: flex; gap: 6px; }
  .field .row > div { flex: 1; }
  h2 { font-size: 12px; color: #f0b760; text-transform: uppercase; letter-spacing: 0.5px;
    margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #30363d; }
  .actions { display: flex; gap: 6px; margin-top: 8px; }
  button.danger.small { padding: 2px 8px; font-size: 11px; }
  .tasks-panel { background: #0f1418; border: 1px solid #20262d;
    border-radius: 4px; padding: 8px; margin-top: 12px; }
  .tasks-panel label { color: #f0b760; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  .tasks-empty { color: #6c7280; font-size: 11px; padding: 6px; font-style: italic; }
  .task-row { background: #161b20; border: 1px solid #252b31; border-radius: 3px;
    padding: 6px; margin-bottom: 6px; display: flex; flex-direction: column; gap: 4px; }
  .task-head { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
  .task-head select { flex: 1; background: #0f1418; color: #d9dde3; border: 1px solid #30363d;
    border-radius: 3px; padding: 3px; }
  .task-row input[type="text"] { background: #0f1418; color: #d9dde3;
    border: 1px solid #252b31; border-radius: 3px; padding: 4px;
    width: 100%; box-sizing: border-box; font-size: 12px; }
  .icon-preview { margin-top: 6px; background: #000; border: 1px solid #30363d;
    padding: 6px; display: flex; align-items: center; justify-content: center;
    min-height: 64px; }
  .icon-preview img { max-width: 100%; max-height: 96px; image-rendering: pixelated; }
</style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <h1>Ghost//Process — editor</h1>
    <span class="scene-name" id="scene-name">—</span>
    <span class="status saved" id="status">ready</span>
    <button id="reload-btn">Reload</button>
    <button class="primary" id="save-btn">Save story.json</button>
  </header>

  <aside id="left">
    <div class="addrow">
      <button id="add-scene-btn">+ Scene</button>
      <button id="add-item-btn">+ Item</button>
    </div>
    <h3>Scenes</h3>
    <ul id="scene-list"></ul>
    <h3 style="margin-top: 16px">Items</h3>
    <ul id="item-list"></ul>
  </aside>

  <main id="center">
    <div id="viewport-toolbar">
      <label>Viewport:</label>
      <select id="viewport-size">
        <option value="390x844">Phone — 390×844 (mobile)</option>
        <option value="390x600">Phone short — 390×600</option>
        <option value="1280x720" selected>Desktop — 1280×720 (game default)</option>
        <option value="1920x1080">Wide — 1920×1080</option>
        <option value="custom">Custom…</option>
      </select>
      <span id="custom-fields" style="display:none; gap:4px; align-items:center;">
        <input id="vw" type="number" min="100" max="4000" style="width:70px" />
        ×
        <input id="vh" type="number" min="100" max="4000" style="width:70px" />
      </span>
      <span style="flex:1"></span>
      <label style="font-size:11px;color:#6c7280">click canvas + drag = draw hitbox (tool)</label>
    </div>
    <div id="canvas-frame">
      <!-- Canvas default size = DESKTOP 1280x720. Editor state.vpW/vpH
           default to the same so a fresh load matches the desktop
           runtime viewport. Users targeting mobile can switch via the
           viewport dropdown (Phone - 390x844). -->
      <canvas id="bg-canvas" width="1280" height="720"></canvas>
      <div id="overlay"></div>
    </div>
  </main>

  <aside id="right"></aside>

  <div class="tab-toggle">
    <button data-tab="left">Scenes / Items</button>
    <button data-tab="center">Canvas</button>
    <button data-tab="right">Inspector</button>
  </div>

  <footer id="bottombar">
    <div class="tool-group">
      <button id="tool-select" class="active">Select</button>
      <button id="tool-draw-hitbox">Draw hitbox</button>
      <button id="tool-add-sprite">+ Sprite</button>
    </div>
    <span id="tool-banner" style="display:none">Draw hitbox: click + drag inside the canvas</span>
  </footer>

</div>

<script src="editor.js"></script>
</body>
</html>
