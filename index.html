<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Pin the CSS viewport to the game design size (390px wide)
         so the runtime renders identically on every device — iPhone,
         S24, Pixel, etc. all see the same 390x844 layout the editor
         previews on. Phones wider than 390 (S24 ~412, iPhone 14 Pro
         ~393) get small centered letterbox bars on the sides;
         phones narrower than 390 (rare today) get #game shrunk via
         max-width:100vw in styles.css.
         Playwright sets viewport size via CDP, bypassing this meta,
         so existing test scripts remain valid. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GHOST//PROCESS</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="game"></div>
    <!-- PC-98 interlace scanline overlay. DOM-based, pointer-events:none
         so clicks pass through to the canvas. Toggled by .no-scanlines
         on <body> for screenshot/clean captures. -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Vendored deps (no CDN; offline-first). See tools/vendor-deps.js to fetch. -->
    <script src="vendor/ink-full.js"></script>

    <!-- Runtime (no Phaser). The whole 16-color dither / sprite / dialogue
         pipeline is plain JS, ~700 LOC. See src/runtime/engine.js. -->
    <!-- Scene palettes (loaded first so Runtime.resolvePalette can find them
         on first scene start). Each is a window.PALETTES[name] = 16-entry
         [r,g,b] table; the slot map (6 lighting + 8 identity + 2 accent)
         is defined in tools/palettes.py in this repo. -->
    <script src="assets/palettes/alley.js"></script>
    <script src="assets/palettes/indoor.js"></script>
    <script src="assets/palettes/lab_clinic.js"></script>
    <script src="assets/palettes/industrial.js"></script>
    <script src="assets/palettes/dialogue.js"></script>
    <script src="assets/palettes/terminal_lab.js"></script>
    <script src="src/runtime/canvas.js"></script>
    <script src="src/runtime/music.js"></script>
    <script src="src/runtime/sprites.js"></script>
    <script src="src/runtime/hitbox.js"></script>
    <script src="src/runtime/scene-base.js"></script>
    <script src="src/runtime/engine.js"></script>
    <script src="src/scenes/_registry.js"></script>
    <script src="src/dialogue.js"></script>
    <script src="src/dialogue-panel.js"></script>
    <script src="src/inventory.js"></script>
    <script src="src/toast.js"></script>
    <script src="src/tasks.js"></script>
    <script src="src/story.js"></script>

    <!-- Entry point — fires Engine.boot() once STORY is loaded. -->
    <script src="boot.js"></script>
</body>
</html>
